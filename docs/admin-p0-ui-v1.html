<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>下笔有元总后台 P0 UI 审核稿 v1</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f4f6f3;
      color: #151a18;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: min(1240px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 18px 0 16px;
      background: rgba(244, 246, 243, .92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(21, 26, 24, .08);
    }
    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }
    .intro {
      margin: 10px 0 0;
      max-width: 940px;
      color: #5f6863;
      font-size: 15px;
      line-height: 1.75;
    }
    .screen-block {
      margin-top: 24px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(21, 26, 24, .10);
      background: rgba(255,255,255,.74);
      box-shadow: 0 18px 52px rgba(31, 38, 34, .12);
    }
    .screen-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .num {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      background: #16a15e;
      color: #fff;
      font-weight: 900;
    }
    h2 {
      margin: 0;
      font-size: 23px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .image-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(21, 26, 24, .08);
      background: #fff;
      text-align: center;
    }
    img {
      display: block;
      width: min(100%, 1080px);
      min-width: 760px;
      height: auto;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>下笔有元总后台 P0 UI 审核稿 v1</h1>
      <p class="intro">本页只画一期必须先定的后台关键页：登录、概览、小程序首页配置、通话引导配置、销售信模板管理、系统开关、用户、销售信、订单支付、权益流水、日志审计。P1/P2 页面暂不铺开。</p>
    </header>

    <section class="screen-block">
      <div class="screen-head"><span class="num">1</span><h2>管理员登录</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/01-admin-login.png" alt="管理员登录" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">2</span><h2>概览</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/02-dashboard.png" alt="概览" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">3</span><h2>小程序配置：后台控制首页文案</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/03-miniapp-config-home.png" alt="小程序配置：首页文案" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">4</span><h2>通话引导配置</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/04-voice-guide-config.png" alt="通话引导配置" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">5</span><h2>销售信模板管理</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/11-sales-template-management.png" alt="销售信模板管理" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">6</span><h2>系统开关</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/05-system-switches.png" alt="系统开关" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">7</span><h2>用户管理</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/06-user-management.png" alt="用户管理" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">8</span><h2>销售信管理</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/07-sales-letter-management.png" alt="销售信管理" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">9</span><h2>订单与支付</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/08-orders-payments.png" alt="订单与支付" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">10</span><h2>权益流水</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/09-entitlement-ledger.png" alt="权益流水" /></div>
    </section>
    <section class="screen-block">
      <div class="screen-head"><span class="num">11</span><h2>日志与审计</h2></div>
      <div class="image-wrap"><img src="./assets/admin-p0-ui-v1/10-logs-audit.png" alt="日志与审计" /></div>
    </section>
  </main>
</body>
</html>
