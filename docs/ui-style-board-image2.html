<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>下笔有元 Image2 UI 风格选择板</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f1eb;
      color: #151a18;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(1680px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      max-width: 620px;
      margin: 0;
      color: #5f6763;
      font-size: 14px;
      line-height: 1.7;
      text-align: right;
    }

    .frame {
      overflow: auto;
      border: 1px solid rgba(21, 26, 24, 0.12);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 22px 60px rgba(31, 38, 34, 0.16);
    }

    img {
      display: block;
      width: 100%;
      min-width: 1180px;
      height: auto;
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      p {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>下笔有元 UI 风格选择板</h1>
      <p>五组风格：首页 + 语音通话互动页。通话页按微信私人语音通话结构设计，用于先选定视觉方向。</p>
    </header>
    <section class="frame">
      <img src="./assets/ui-style-board-image2-v1.png" alt="下笔有元五组 UI 风格选择板" />
    </section>
  </main>
</body>
</html>
