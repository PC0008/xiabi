<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>微信亲和绿：首页 + 通话页审核图</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f5f3ee;
      color: #151a18;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(1380px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: #5d6762;
      font-size: 15px;
      line-height: 1.7;
    }

    .frame {
      overflow: auto;
      border-radius: 20px;
      border: 1px solid rgba(21, 26, 24, .10);
      background: #fff;
      box-shadow: 0 20px 60px rgba(31, 38, 34, .14);
    }

    img {
      display: block;
      width: 100%;
      min-width: 900px;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>微信亲和绿：首页 + 通话页</h1>
    <p>首页采用你选的图 1 布局，通话页采用微信私人语音通话感，底部只保留扬声器、按住说话、挂断，并增加“切换打字模式”。</p>
    <section class="frame">
      <img src="./assets/wechat-green-home-call-review-v1.png" alt="微信亲和绿首页和通话页 UI 审核图" />
    </section>
  </main>
</body>
</html>
