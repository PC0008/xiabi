<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>下笔有元真实落地 UI 稿</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f4f3ef;
      color: #151a18;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 18px 0 16px;
      background: rgba(244, 243, 239, .92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(21, 26, 24, .08);
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .intro {
      margin: 10px 0 0;
      max-width: 860px;
      color: #5f6863;
      font-size: 15px;
      line-height: 1.75;
    }

    .screen-block {
      margin-top: 28px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(21, 26, 24, .10);
      background: rgba(255,255,255,.70);
      box-shadow: 0 18px 52px rgba(31, 38, 34, .12);
    }

    .screen-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .num {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      display: inline-grid;
      place-items: center;
      background: #16a15e;
      color: #fff;
      font-weight: 900;
    }

    h2 {
      margin: 0;
      font-size: 23px;
      line-height: 1.2;
    }

    .image-wrap {
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(21, 26, 24, .08);
      background: #fff;
      text-align: center;
    }

    img {
      display: block;
      width: min(100%, 760px);
      min-width: 360px;
      height: auto;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>下笔有元真实落地 UI 稿</h1>
      <p class="intro">先审页面，不开发。每张图单独生成，目标是接近可落地的小程序页面。确认后再拆成 WXML/WXSS、字号、间距、颜色和素材。</p>
    </header>

    <section class="screen-block">
      <div class="screen-head"><span class="num">1</span><h2>首次头像昵称授权页</h2></div>
      <div class="image-wrap"><img src="./assets/ui-final-draft-image2/01-auth.png" alt="首次头像昵称授权页" /></div>
    </section>

    <section class="screen-block">
      <div class="screen-head"><span class="num">2</span><h2>首页</h2></div>
      <div class="image-wrap"><img src="./assets/ui-final-draft-image2/02-home.png" alt="首页" /></div>
    </section>

    <section class="screen-block">
      <div class="screen-head"><span class="num">3</span><h2>语音通话互动页</h2></div>
      <div class="image-wrap"><img src="./assets/ui-final-draft-image2/03-call.png" alt="语音通话互动页" /></div>
    </section>

    <section class="screen-block">
      <div class="screen-head"><span class="num">4</span><h2>信息确认页</h2></div>
      <div class="image-wrap"><img src="./assets/ui-final-draft-image2/04-confirm.png" alt="信息确认页" /></div>
    </section>

    <section class="screen-block">
      <div class="screen-head"><span class="num">5</span><h2>排队生成 + 手机号授权页</h2></div>
      <div class="image-wrap"><img src="./assets/ui-final-draft-image2/05-generating-phone.png" alt="排队生成手机号授权页" /></div>
    </section>

    <section class="screen-block">
      <div class="screen-head"><span class="num">6</span><h2>销售信详情页</h2></div>
      <div class="image-wrap"><img src="./assets/ui-final-draft-image2/06-letter.png" alt="销售信详情页" /></div>
    </section>
  </main>
</body>
</html>
